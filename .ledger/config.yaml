version: 1
project: ledger
source:
  entries: .ledger/entries
  backlog: .ledger/backlog
  decisions: .ledger/decisions
  releases: .ledger/releases
ids:
  entryPrefix: ""
  entryWidth: 4
  backlogPrefix: B
  decisionPrefix: D
validation:
  profile: standard
  requireVerification: true
  requireChangedFiles: true
  requireInvariants: true
  baseline: .ledger/reports/validation-baseline.json
  ignoreMissingRefsForStatuses:
    - historical
  requiredSections:
    change:
      - Summary
      - Why
      - Changed Files
      - Behavior And UX Impact
      - Invariants
      - Verification
    backlog:
      - Problem
      - Desired Outcome
      - Scope
      - Acceptance Checks
      - Risks
      - Promotion Notes
    decision:
      - Context
      - Decision
      - Consequences
      - Revisit Criteria
    release:
      - Summary
      - Changes
      - Verification
      - Known Issues
    product-note:
      - Context
      - Finding
      - Impact
      - Recommendation
      - Follow-ups
    feedback:
      - Context
      - Finding
      - Impact
      - Recommendation
      - Follow-ups
schema:
  allowedFrontmatterFields: []
  extensions: {}
git:
  requireEntryFor:
    - src/**
    - test/**
    - docs/**
  ignore:
    - .ledger/indexes/**
    - .ledger/reports/**
    - .ledger/dist/**
    - docs/llm/manifest.json
    - docs/llm/START_HERE.md
    - node_modules/**
    - dist/**
    - build/**
    - coverage/**
    - .next/**
    - out/**
    - vendor/**
    - generated/**
    - "**/generated/**"
indexes:
  output: .ledger/indexes
reports:
  output: .ledger/reports
render:
  output: .ledger/dist
  budgets:
    maxHtmlBytes: 1000000
    maxSearchIndexBytes: 500000
    maxGraphBytes: 500000
    maxTotalBytes: 2000000
    maxWriteMs: 3000
performance:
  budgets:
    maxReadMs: 1000
    maxValidateMs: 1000
    maxIndexMs: 1000
    maxRenderModelMs: 1000
    maxSearchMs: 1000
    maxTotalMs: 4000
docs:
  root: docs
  managed: false
  adoption: partial
  routing:
    startHere: docs/llm/START_HERE.md
    manifest: docs/llm/manifest.json
